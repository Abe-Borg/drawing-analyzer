# Windows installer build + release for Drawing Analyzer.
#
# What it does:
#   * push a tag  vX.Y.Z  -> build the installer, generate latest.json, and
#                            publish both as assets on a GitHub Release. The
#                            installed app's updater fetches
#                            releases/latest/download/latest.json to discover it.
#   * pull_request / workflow_dispatch (packaging-related changes) -> build +
#                            self-check + compile the installer WITHOUT
#                            publishing, and upload the artifacts, so the whole
#                            Windows packaging pipeline is validated (and the
#                            installer is downloadable) before any release.
#
# Cutting a release (see docs/RELEASE_WINDOWS.md for the full runbook):
#   1. Bump the version in pyproject.toml AND src/drawing_analyzer/__init__.py
#      (tests/test_release_metadata.py keeps them in lockstep).
#   2. Commit, then:  git tag v1.2.3 && git push origin v1.2.3
#   3. This workflow builds and publishes the release automatically.
#
# Supply-chain notes (mirrors .github/workflows/ci.yml §9.8): third-party
# actions are pinned to immutable commit SHAs (the trailing comment is the
# human-readable version); the release/publish step is gated to tag refs and is
# the only step that needs write access.
#
# NOTE TO MAINTAINER: the action SHAs below were pinned from their release tags
# but could not be re-verified against the GitHub API from the build sandbox.
# Confirm them (or let Dependabot manage them) before relying on this workflow —
# a stale/incorrect SHA fails loudly at that step, it is never a silent gap.
name: Release (Windows installer)

on:
  push:
    tags: ["v*"]
  pull_request:
    paths:
      - "packaging/windows/**"
      - ".github/workflows/release.yml"
      - "src/drawing_analyzer/core/updates.py"
      - "pyproject.toml"
  workflow_dispatch:

# Least privilege by default; the tag-gated publish step needs write and
# declares it at the job level below.
permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-installer:
    name: Build Windows installer
    runs-on: windows-latest
    # Write is exercised ONLY by the tag-gated "Publish GitHub Release" step;
    # every other step only reads.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          if ($ref -like "refs/tags/v*") {
            $v = $ref -replace "^refs/tags/v", ""
          } else {
            $v = python -c "import tomllib,pathlib;print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])"
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Resolved version: $v"

      - name: Guard - tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $pkg = python -c "import tomllib,pathlib;print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])"
          if ($pkg -ne "${{ steps.ver.outputs.version }}") {
            Write-Error "Tag version ${{ steps.ver.outputs.version }} does not match pyproject version $pkg. Bump the version and re-tag."
            exit 1
          }

      - name: Install app (gui extras) + PyInstaller
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[gui]"
          pip install "pyinstaller==6.11.1"

      - name: Build one-folder app (PyInstaller)
        shell: pwsh
        run: pyinstaller packaging/windows/drawing-analyzer.spec --noconfirm --clean

      - name: Smoke - frozen exe self-check
        shell: pwsh
        run: |
          $env:DRAWING_ANALYZER_SELFCHECK_OUT = "$PWD\selfcheck.txt"
          $p = Start-Process -FilePath "dist\DrawingAnalyzer\DrawingAnalyzer.exe" `
                 -ArgumentList "--selfcheck" -Wait -PassThru
          if (Test-Path selfcheck.txt) { Get-Content selfcheck.txt }
          if ($p.ExitCode -ne 0) {
            Write-Error "Frozen exe self-check failed (exit $($p.ExitCode)) - a hidden import is likely missing from the spec."
            exit 1
          }

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Compile installer (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & "$iscc" /DMyAppVersion=${{ steps.ver.outputs.version }} packaging\windows\installer.iss

      - name: Generate update manifest (latest.json)
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          $url = "https://github.com/${{ github.repository }}/releases/download/v$v/DrawingAnalyzerSetup.exe"
          python packaging/windows/make_manifest.py `
            --version $v `
            --installer dist/installer/DrawingAnalyzerSetup.exe `
            --url $url `
            --out dist/installer/latest.json `
            --notes "Drawing Analyzer v$v. See the release notes for details." `
            --published-at (Get-Date -Format "yyyy-MM-dd")
          Get-Content dist/installer/latest.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: windows-installer
          path: |
            dist/installer/DrawingAnalyzerSetup.exe
            dist/installer/latest.json
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $notes = "Windows installer for Drawing Analyzer $tag.`n`n" +
                   "Download **DrawingAnalyzerSetup.exe** below and run it. " +
                   "The app is not code-signed, so Windows SmartScreen may warn " +
                   "on first run - choose **More info** then **Run anyway**.`n`n" +
                   "Existing installs will offer this update automatically."
          $assets = "dist/installer/DrawingAnalyzerSetup.exe", "dist/installer/latest.json"
          gh release create "$tag" $assets --repo "${{ github.repository }}" `
            --title "Drawing Analyzer $tag" --notes "$notes" --verify-tag
          if ($LASTEXITCODE -ne 0) {
            # Release already exists (e.g. a re-run) - upload/replace the assets.
            gh release upload "$tag" $assets --repo "${{ github.repository }}" --clobber
          }
