# requirements-release.lock — reproducible release-build constraints (Phase 27 §19.8).
#
# Generated from a clean venv:  pip install "drawing-analyzer[dev] @ file:///<repo>"
# then `pip freeze --exclude-editable`, on Linux / CPython 3.11. Version pins are
# platform-independent (all deps ship multi-platform wheels); hashes are not
# pinned because pymupdf/tiktoken wheels differ per platform.
#
# Use as a CONSTRAINTS file, never a requirements file:
#     pip install -c requirements-release.lock ".[dev]"
# Regenerate deliberately (and note it in CHANGELOG.md) when bumping deps:
#     python -m venv /tmp/lockenv && /tmp/lockenv/bin/pip install ".[dev]" \
#         && /tmp/lockenv/bin/pip freeze --exclude-editable
